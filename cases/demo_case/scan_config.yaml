# scan_config.yaml — ADN 工艺最小参数扫描配置
# 对应仿真文件：二级氢氰化工段.bkp
#
# 目的：验证 param_scan workflow 端到端链路
# 规模：1 个扫描变量 × 3 个点 = 3 次仿真（最小可验证规模）
# 模式：zip（逐点，等同于单变量扫描）

# ---------------------------------------------------------------------------
# 仿真文件
# ---------------------------------------------------------------------------
simulator:
  filepath: cases/demo_case/二级氢氰化工段.bkp
  visible: false
  suppress_dialogs: true
  timeout: 300
  reinit: true
  verify_inputs: true
  input_rtol: 1.0e-6

# ---------------------------------------------------------------------------
# 扫描变量（只扫回流比，覆盖低/中/高三个典型工况）
# ---------------------------------------------------------------------------
scan:
  mode: zip           # 单变量扫描，zip 与 grid 等价，语义更清晰
  max_cases: 10       # 安全上限，防止配置错误生成过多工况

  scan_vars:
    - name: T0301_BASIS_RR
      description: T0301 回流比（低/中/高）
      aspen_path: \Data\Blocks\T0301\Input\BASIS_RR
      values: [1.0, 2.0, 3.0]   # 覆盖 case_config.yaml 中 [1.0, 3.0] 的两端和初始值

  fixed_vars:
    - name: T0301_BF
      description: T0301 塔底采出比（固定在初始值）
      aspen_path: \Data\Blocks\T0301\Input\B:F
      value: 0.6

    - name: T0301_FEED_STAGE
      description: T0301 进料板位置（固定在初始值）
      aspen_path: \Data\Blocks\T0301\Input\FEED_STAGE\0318
      value: 15

# ---------------------------------------------------------------------------
# 输出节点
# ---------------------------------------------------------------------------
output_paths:
  - \Data\Streams\ADN\Output\MASSFRAC\MIXED\ADN
  - \Data\Streams\ADN\Output\MASSFLOW\MIXED\ADN

# ---------------------------------------------------------------------------
# 目标函数（与 case_config.yaml 保持一致）
# ---------------------------------------------------------------------------
objectives:
  - name: ADN_FRAC
    description: ADN 产品流股中 ADN 的质量分数
    aspen_path: \Data\Streams\ADN\Output\MASSFRAC\MIXED\ADN
    minimize: false
    unit: ""

  - name: ADN_FLOW
    description: ADN 产品流股中 ADN 的质量流量
    aspen_path: \Data\Streams\ADN\Output\MASSFLOW\MIXED\ADN
    minimize: false
    unit: kg/hr

# ---------------------------------------------------------------------------
# block/stream 提取（与 case_config.yaml 保持一致）
# ---------------------------------------------------------------------------
extraction:
  check_status_paths:
    - \Data\Blocks\T0301
    - \Data\Streams\ADN
  blocks:
    - T0301
  streams:
    - ADN
  block_max_depth: 3
  stream_max_depth: 3
  stream_output_subtree: "Output\\STR_MAIN"
  strict_extraction: false
